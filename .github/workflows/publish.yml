name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # Uses npm Trusted Publishing (OIDC). No token env var — the npm CLI
      # exchanges the GitHub Actions OIDC token (enabled by `id-token: write`
      # above) for a short-lived publish token. Configure the trusted
      # publisher for this repo on npmjs.com under the `scrapebadger`
      # package settings → Publishing → Trusted Publishers.
      - name: Publish to npm
        run: npm publish --provenance --access public
