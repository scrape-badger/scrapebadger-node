name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # NB: no `registry-url` here on purpose. `setup-node` with
      # `registry-url` writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
      # into .npmrc and sets NODE_AUTH_TOKEN to a placeholder — that
      # placeholder auth wins over the npm CLI's OIDC exchange, so the
      # trusted-publishing flow never runs. Omitting `registry-url` lets
      # npm default to npmjs.org AND use OIDC auth.
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      # Node 20 ships with npm 10.x. Trusted Publishing (OIDC → npm)
      # requires npm ≥ 11.5.1, so upgrade before publishing.
      - name: Upgrade npm
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "---global .npmrc:"
          cat /opt/hostedtoolcache/node/*/x64/lib/node_modules/npm/.npmrc 2>/dev/null || echo "(none)"
          echo "---user .npmrc:"
          cat ~/.npmrc 2>/dev/null || echo "(none)"
          echo "---cwd .npmrc:"
          cat .npmrc 2>/dev/null || echo "(none)"
          echo "---OIDC env:"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL=${ACTIONS_ID_TOKEN_REQUEST_URL:+(set)}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN=${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+(set)}"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # Uses npm Trusted Publishing (OIDC). No token env var — the npm CLI
      # exchanges the GitHub Actions OIDC token (enabled by `id-token: write`
      # above) for a short-lived publish token. Configure the trusted
      # publisher for this repo on npmjs.com under the `scrapebadger`
      # package settings → Publishing → Trusted Publishers.
      - name: Publish to npm
        run: npm publish --provenance --access public
